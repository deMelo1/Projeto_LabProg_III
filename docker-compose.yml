services:
  db:
    image: postgres:16
    container_name: ecofilter_db
    environment:
      POSTGRES_USER: eco
      POSTGRES_PASSWORD: eco
      POSTGRES_DB: ecofilter
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eco -d ecofilter"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ecofilter_backend
    environment:
      DATABASE_URL: postgresql://eco:eco@db:5432/ecofilter
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: ecofilter_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
  uploads_data:
